<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>registration form</title>
</head>
<link rel="stylesheet" href="style.css">
<body>
    <form id="myForm">
    <h1>Registration Form</h1>

    <label>Name:</label><br>
    <input type="text" id="name" placeholder="Enter name" required>
    <p id="nameError" style="color:red;"></p>

    <label>Email</label><br>
    <input type="email" id="email" placeholder="Enter email" required>
    <p id="emailError" style="color:red;"></p>

    <fieldset>
        <legend>Gender</legend>

        <input type="radio" name="gender" value="male" required>male <br>
        <input type="radio" name="gender" value="female"> female<br>
        <input type="radio" name="gender" value="other">other <br>
    </fieldset>
       

    <label>DOB:</label>
    <input type="date" id="dob" required><br><br>

    <label>Phone</label>
    <input type="tel" id="phone" placeholder="Enter phone number" required><br><br>

    <label>Department</label><br>
    <select id="department"required>
        <option value="">----Select Department----</option>
        <option>CS</option>
        <option>AI</option>
        <option>EE</option>
        <option>ME</option>
    </select>

    <br><br>

    <label>Password</label><br>
    <input type="password" id="password" placeholder="Enter password" required><br><br>

    <input type="submit" value="Register">
</form>

<hr>

<h2>Click Counter</h2>

<p id="count">0</p>

<button id="clickBtn">Click Me</button>
<button id="resetBtn">Reset</button>

<br><br>

<button type="button" id="toggleBtn">Dark Mode</button>
<script src="registrationform.js"></script>
</body>
</html>
